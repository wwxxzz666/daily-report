# 日报助手配置文件
# 配置文件位置: %APPDATA%/日报助手/config.yaml

# 工作时间配置
work_time:
  start: "09:00"            # 工作开始时间
  end: "18:00"              # 工作结束时间（也是日报自动生成时间）
  weekdays: [1, 2, 3, 4, 5] # 工作日 (1=周一, 7=周日)

# 窗口采样间隔
sample_interval: "5s"

# 要监控的应用（进程名，不区分大小写）
# ["*"] 表示记录所有应用
monitored_apps:
  - "*"

# 要忽略的应用（优先级高于 monitored_apps）
ignored_apps:
  - "explorer"
  - "SearchHost"
  - "ShellExperienceHost"
  - "Taskmgr"
  - "ApplicationFrameHost"

# 敏感词列表（标题包含这些词的窗口不会被记录）
# 用于保护包含密码、薪资等敏感信息的窗口
sensitive_words:
  - "密码"
  - "password"
  - "薪资"
  - "salary"
  - "身份证"
  - "银行卡"
  - "token"
  - "secret"

# 浏览器历史监控
browser:
  enabled: true
  browsers: ["chrome", "edge"]
  history_hours: 8

# ============================================================
# LLM API 配置
# ============================================================
# 支持两种方式：
#
# 方式一：使用预设提供商（推荐，只需填 provider 和 api_key）
#   provider 可选值：
#     deepseek  - DeepSeek（性价比高，推荐国内用户）
#     openai    - OpenAI（GPT-4o-mini）
#     qwen      - 通义千问（阿里云）
#     moonshot  - Moonshot（月之暗面 Kimi）
#     zhipu     - 智谱清言（GLM-4）
#     ollama    - Ollama 本地模型（数据不出本机，隐私最佳）
#     lmstudio  - LM Studio 本地模型
#
# 方式二：自定义端点（provider 留空或设为 "custom"，需手动填 endpoint）
#
llm:
  # === 方式一示例：使用预设提供商 ===
  provider: "deepseek"          # 改成你想要的提供商
  api_key: "sk-xxx"             # 替换为你的 API Key（ollama/lmstudio 不需要）
  model: ""                     # 留空使用预设默认模型，也可指定如 "deepseek-reasoner"
  temperature: 0.7
  max_tokens: 4096
  timeout: "60s"

  # === 方式二示例：自定义端点 ===
  # provider: ""                # 留空表示自定义
  # endpoint: "https://your-api.com/v1/chat/completions"
  # model: "your-model"
  # api_key: "your-key"

  # === 本地 Ollama 示例 ===
  # provider: "ollama"
  # model: "qwen2.5:7b"         # 需要先 ollama pull qwen2.5:7b
  # api_key: ""                 # 本地模型不需要

# 报告配置
report:
  output_dir: "%APPDATA%/日报助手/reports"
  weekly_day: 5              # 周五生成周报
  weekly_time: "18:10"       # 周报生成时间
